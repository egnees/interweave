name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustfmt.toml uses unstable options (wrap_comments, comment_width),
      # so formatting must be checked with nightly rustfmt.
      - name: Install nightly toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install stable toolchain (clippy, tests)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      # Catch docs.rs-breaking changes (broken intra-doc links, doc warnings) and
      # missing public docs on every PR — docs are the crate's public face.
      - name: Doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

      - name: Missing docs
        run: cargo rustc --lib --all-features -- -D missing_docs

  # Verify the crate still builds on its declared minimum supported Rust version
  # (Cargo.toml `rust-version`), so the published MSRV stays an enforced contract.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo +1.96.0 check --locked --all-targets --all-features
